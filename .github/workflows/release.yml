name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write   # needed to commit, tag, and create releases

jobs:
  version_tag_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ensure tags & full history are available

      - name: Set up git identity (CI)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Make script executable
        run: chmod +x ./bump-version.sh

      - name: Bump version and tag (auto)
        id: bump
        env:
          GIT_TRACE: 1
        run: ./bump-version.sh auto

      # (Optional) Build your project/artifacts here, e.g.:
      # - name: Build
      #   run: |
      #     npm ci && npm run build
      #   # save outputs under dist/ or build/ to upload as release assets

      - name: Create GitHub Release
        if: ${{ steps.bump.outputs.new_version != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body_path: .release-notes.md     # notes created by the script
          # generate_release_notes: true    # (alternative) let GitHub auto-generate
          draft: false
          prerelease: false
          files: |
            dist/**
            build/**
