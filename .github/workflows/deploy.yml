on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create version.json and inject SW build id
        run: |
          BUILD=${{ github.run_number }}
          SHA=${{ github.sha }}
          # Simple date-based version; customize if desired
          VERSION=$(date -u +"%Y.%m.%d")
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # version.json for UI to read
          cat > version.json <<EOF
          {
            "version": "${VERSION}",
            "build": "${BUILD}",
            "commit": "${SHA}",
            "timestamp": "${TS}"
          }
          EOF

          # Inject build id into SW cache name
          sed -i "s/__BUILD_ID__/${BUILD}/g" sw.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Deploy repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
